services:
  sentinel-api:
    build:
      context: .
      dockerfile: SentinelCore.Api/Dockerfile
      args:
        - BUILD_CONFIGURATION=Debug
    container_name: sentinel_api
    ports :
      - "${API_EXTERNAL_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__SentinelDb=${ConnectionStrings__SentinelDb}
    depends_on:
      sentinel-db:
        condition: service_healthy
    networks:
      - sentinel-network
      
  sentinel-db:
    image: postgres:16-alpine
    container_name: sentinel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentinel-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  sentinel-network:
    driver: bridge